name: Bug report
description: Report a reproducible problem in Sightline.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: input
    id: area
    attributes:
      label: Area
      description: Backend, frontend, detector, RTSP, Docker, docs, or other.
      placeholder: Backend
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Start the backend
        2. Open the dashboard
        3. Click Load PKLot
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node version, browser, model path, and whether Docker is used.
      placeholder: |
        macOS:
        Python:
        Node:
        Browser:
        Docker:
        MODEL_PATH:
