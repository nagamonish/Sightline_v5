services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://parkiq:parkiq@postgres:5432/parkiq
      REDIS_URL: redis://redis:6379
      MODEL_PATH: /models/yolov8m-obb.pt
      IOU_THRESHOLD: "0.40"
      CONFIDENCE_THRESHOLD: "0.45"
      SMOOTHING_WINDOW: "5"
    volumes:
      - ../models:/models
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: /api
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: parkiq
      POSTGRES_USER: parkiq
      POSTGRES_PASSWORD: parkiq
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"

volumes:
  postgres-data:
